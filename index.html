<style>
html { scroll-behavior:smooth; }
*,:after,:before { box-sizing:border-box; }
.no-scrollbar::-webkit-scrollbar { display:none; }
.no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

/* ---- HERO BANNER SLIDER ---- */
.hero-slide { position:absolute; inset:0; transition:opacity 0.9s cubic-bezier(.4,0,.2,1); opacity:0; pointer-events:none; }
.hero-slide.active { opacity:1; pointer-events:auto; }

/* ---- PRODUCT CAROUSEL ---- */
.car-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:top center; transition:opacity 0.45s ease; opacity:0; }
.car-img.on { opacity:1; }
.cdot { width:6px; height:6px; border-radius:9999px; background:rgba(255,255,255,0.5); transition:all .3s; flex-shrink:0; }
.cdot.active { width:18px; background:#fff; }
.card-arrow { opacity:0; transition:opacity .25s; }
.product-card:hover .card-arrow { opacity:1; }

/* ---- MODAL ---- */
#product-modal { transition:opacity .2s; }
#product-modal.hidden { opacity:0; pointer-events:none; display:flex !important; }
#product-modal:not(.hidden) { opacity:1; }

/* ---- DISCOUNT ---- */
.badge-desc { background:linear-gradient(135deg,#ef4444,#b91c1c); }
.strike { position:relative; display:inline-block; }
.strike::after { content:""; position:absolute; left:0; top:50%; width:100%; height:1.5px; background:#ef4444; transform:translateY(-50%) rotate(-5deg); }

/* ---- TOAST ---- */
#toast { transition:all .35s cubic-bezier(.34,1.56,.64,1); }

/* ---- WA FLOAT ---- */
@keyframes wafloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
#wa-float { animation:wafloat 3s ease-in-out infinite; }

/* ---- HERO DOTS ---- */
.hero-dot { width:8px; height:8px; border-radius:9999px; background:rgba(255,255,255,.45); border:none; cursor:pointer; transition:all .3s; }
.hero-dot.active { width:24px; background:#fff; }

/* ---- CART DRAWER ---- */
#cart-drawer { transition:transform .3s ease; }

/* Product card hover overlay */
.card-overlay { opacity:0; transition:opacity .25s; }
.product-card:hover .card-overlay { opacity:1; }
</style>
