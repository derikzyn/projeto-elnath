<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin — Esquenta Lingerie</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; }

        /* LOGIN */
        #login-screen {
            position: fixed; inset: 0; background: #111;
            display: flex; align-items: center; justify-content: center; z-index: 999;
            transition: opacity .3s;
        }
        .login-box {
            background: white; border-radius: 20px; padding: 40px;
            width: 100%; max-width: 360px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
        }
        .login-box h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 6px; }
        .login-box p  { font-size: .75rem; color: #999; margin-bottom: 24px; text-transform: uppercase; letter-spacing: .1em; }
        .login-box input {
            width: 100%; padding: 14px; border: 1.5px solid #e0d0d0;
            border-radius: 10px; font-size: 1rem; text-align: center;
            letter-spacing: .15em; margin-bottom: 12px; outline: none;
            transition: border-color .2s;
        }
        .login-box input:focus { border-color: #E1B1B1; }
        .login-box button {
            width: 100%; padding: 14px; background: #111; color: white;
            border: none; border-radius: 10px; font-weight: 700;
            font-size: .8rem; letter-spacing: .1em; text-transform: uppercase;
            cursor: pointer; transition: background .2s;
        }
        .login-box button:hover { background: #E1B1B1; color: #111; }
        #login-erro { color: #e53; font-size: .8rem; margin-top: 10px; min-height: 18px; }

        /* APP */
        #app { display: none; }

        /* HEADER */
        header {
            background: #111; color: white; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.3);
        }
        header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
        header span { font-size: .7rem; color: #E1B1B1; letter-spacing: .15em; text-transform: uppercase; display: block; }
        .header-right { display: flex; gap: 12px; align-items: center; }
        .btn-sair {
            background: transparent; border: 1px solid rgba(255,255,255,.3);
            color: white; padding: 8px 16px; border-radius: 8px;
            font-size: .7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .08em; cursor: pointer; transition: all .2s;
        }
        .btn-sair:hover { background: rgba(255,255,255,.1); }

        /* MAIN */
        main { max-width: 900px; margin: 0 auto; padding: 30px 20px; }

        /* STATUS BAR */
        #status-bar {
            background: white; border-radius: 12px; padding: 14px 20px;
            margin-bottom: 24px; display: flex; align-items: center;
            gap: 12px; font-size: .8rem; box-shadow: 0 2px 8px rgba(0,0,0,.06);
            border-left: 4px solid #E1B1B1;
        }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
        #status-dot.ok  { background: #22c55e; }
        #status-dot.err { background: #ef4444; }

        /* SEARCH */
        .search-row {
            display: flex; gap: 12px; margin-bottom: 20px;
        }
        .search-row input {
            flex: 1; padding: 12px 16px; border: 1.5px solid #e0d0d0;
            border-radius: 10px; font-size: .9rem; outline: none; transition: border-color .2s;
        }
        .search-row input:focus { border-color: #E1B1B1; }
        .btn-reload {
            padding: 12px 20px; background: #111; color: white;
            border: none; border-radius: 10px; font-size: .75rem;
            font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
            cursor: pointer; transition: background .2s; white-space: nowrap;
        }
        .btn-reload:hover { background: #E1B1B1; color: #111; }

        /* PRODUCT CARD */
        .produto {
            background: white; border-radius: 14px; padding: 20px;
            margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
            display: flex; align-items: center; gap: 16px;
            transition: box-shadow .2s;
        }
        .produto:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        .produto-foto {
            width: 60px; height: 75px; border-radius: 8px;
            object-fit: cover; object-position: top; border: 1.5px solid #f0e0e0;
            flex-shrink: 0;
        }
        .produto-foto-placeholder {
            width: 60px; height: 75px; border-radius: 8px;
            background: #f5e8e8; display: flex; align-items: center;
            justify-content: center; font-size: 1.4rem; flex-shrink: 0;
        }
        .produto-info { flex: 1; min-width: 0; }
        .produto-nome {
            font-family: 'Playfair Display', serif; font-size: 1rem;
            font-weight: 600; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .produto-desc {
            font-size: .72rem; color: #999; margin-bottom: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .preco-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .preco-label { font-size: .7rem; color: #999; text-transform: uppercase; letter-spacing: .08em; }
        .preco-input {
            width: 100px; padding: 8px 12px; border: 1.5px solid #e0d0d0;
            border-radius: 8px; font-size: .95rem; font-weight: 600;
            outline: none; transition: border-color .2s;
        }
        .preco-input:focus { border-color: #E1B1B1; }
        .original-input {
            width: 100px; padding: 8px 12px; border: 1.5px solid #e0d0d0;
            border-radius: 8px; font-size: .85rem; color: #999;
            outline: none; transition: border-color .2s;
        }
        .original-input:focus { border-color: #E1B1B1; }
        .desconto-input {
            width: 90px; padding: 8px 12px; border: 1.5px solid #fca5a5;
            border-radius: 8px; font-size: .8rem; color: #ef4444;
            font-weight: 700; outline: none; transition: border-color .2s;
        }
        .desconto-input:focus { border-color: #ef4444; }
        .btn-salvar {
            padding: 9px 20px; background: #111; color: white;
            border: none; border-radius: 8px; font-size: .72rem;
            font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
            cursor: pointer; transition: all .2s; white-space: nowrap;
        }
        .btn-salvar:hover  { background: #E1B1B1; color: #111; }
        .btn-salvar:disabled { background: #ccc; cursor: not-allowed; }
        .btn-salvar.salvando { background: #999; }

        /* BADGE */
        .badge {
            display: inline-block; padding: 3px 8px;
            background: #fef2f2; color: #ef4444;
            border: 1px solid #fca5a5; border-radius: 6px;
            font-size: .65rem; font-weight: 700;
        }

        /* TOAST */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #111; color: white; padding: 14px 20px;
            border-radius: 12px; font-size: .8rem; font-weight: 600;
            border-left: 4px solid #E1B1B1;
            transform: translateY(80px); opacity: 0;
            transition: all .35s cubic-bezier(.34,1.56,.64,1);
            z-index: 999; max-width: 300px;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.erro { border-left-color: #ef4444; }

        /* EMPTY / LOADING */
        .estado {
            text-align: center; padding: 60px 20px;
            color: #999; font-size: .9rem;
        }
        .estado p { margin-top: 8px; font-size: .8rem; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h1>ESQUENTA</h1>
        <p>Lingerie — Painel Admin</p>
        <input type="password" id="senha-input" placeholder="••••••••••"
               onkeydown="if(event.key==='Enter') fazerLogin()">
        <button onclick="fazerLogin()">Entrar</button>
        <div id="login-erro"></div>
    </div>
</div>

<!-- APP -->
<div id="app">
    <header>
        <div>
            <h1>Esquenta Admin</h1>
            <span>Painel de Gerenciamento</span>
        </div>
        <div class="header-right">
            <a href="https://projeto-elnath-production.up.railway.app" target="_blank"
               style="color:#E1B1B1;font-size:.7rem;text-decoration:none;letter-spacing:.08em;">
                Ver Site ↗
            </a>
            <button class="btn-sair" onclick="sair()">Sair</button>
        </div>
    </header>

    <main>
        <!-- Status do banco -->
        <div id="status-bar">
            <div id="status-dot"></div>
            <span id="status-txt">Conectando ao servidor...</span>
        </div>

        <!-- Busca + Reload -->
        <div class="search-row">
            <input type="text" id="busca" placeholder="Buscar produto pelo nome..."
                   oninput="filtrar(this.value)">
            <button class="btn-reload" onclick="carregarProdutos()">↻ Recarregar</button>
        </div>

        <!-- Lista -->
        <div id="lista-produtos">
            <div class="estado">Carregando produtos...</div>
        </div>
    </main>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
    // ── CONFIG ──────────────────────────────────────────────────
    const API = 'https://projeto-elnath-production.up.railway.app';
    let SENHA = '';
    let todosOsProdutos = [];

    // ── LOGIN ────────────────────────────────────────────────────
    function fazerLogin() {
        const s = document.getElementById('senha-input').value.trim();
        if (!s) return;

        document.getElementById('login-erro').textContent = '';

        // Testa a senha batendo na API
        fetch(`${API}/api/admin/produtos`, {
            headers: { 'x-admin-senha': s }
        })
        .then(res => {
            if (res.ok) {
                SENHA = s;
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    verificarStatus();
                    carregarProdutos();
                }, 300);
            } else {
                document.getElementById('login-erro').textContent = 'Senha incorreta. Tente novamente.';
            }
        })
        .catch(() => {
            document.getElementById('login-erro').textContent = 'Erro de conexão. Verifique se o servidor está online.';
        });
    }

    function sair() {
        SENHA = '';
        location.reload();
    }

    // ── STATUS ───────────────────────────────────────────────────
    function verificarStatus() {
        fetch(`${API}/api/health`)
            .then(r => r.json())
            .then(d => {
                const ok = d.status === 'ok';
                document.getElementById('status-dot').className = ok ? 'ok' : 'err';
                document.getElementById('status-txt').textContent = ok
                    ? `✓ Servidor online — Banco de dados conectado`
                    : `✗ Problema no banco de dados`;
            })
            .catch(() => {
                document.getElementById('status-dot').className = 'err';
                document.getElementById('status-txt').textContent = '✗ Servidor offline ou inacessível';
            });
    }

    // ── CARREGAR PRODUTOS ────────────────────────────────────────
    function carregarProdutos() {
        document.getElementById('lista-produtos').innerHTML =
            '<div class="estado">Carregando produtos...</div>';

        fetch(`${API}/api/admin/produtos`, {
            headers: { 'x-admin-senha': SENHA }
        })
        .then(r => {
            if (!r.ok) throw new Error('Sem autorização');
            return r.json();
        })
        .then(produtos => {
            todosOsProdutos = produtos;
            renderizar(produtos);
        })
        .catch(err => {
            document.getElementById('lista-produtos').innerHTML =
                `<div class="estado">❌ Erro ao carregar: ${err.message}<p>Verifique se o servidor Railway está online.</p></div>`;
        });
    }

    // ── RENDERIZAR ───────────────────────────────────────────────
    function renderizar(lista) {
        const cont = document.getElementById('lista-produtos');

        if (!lista.length) {
            cont.innerHTML = '<div class="estado">Nenhum produto cadastrado ainda.<p>Use o endpoint de importação para adicionar produtos.</p></div>';
            return;
        }

        cont.innerHTML = lista.map(p => {
            const foto = p.fotos && p.fotos.length
                ? `<img class="produto-foto" src="${p.fotos[0]}" alt="${p.nome}">`
                : `<div class="produto-foto-placeholder">👗</div>`;

            const badgeDesc = p.desconto
                ? `<span class="badge">${p.desconto}</span>`
                : '';

            return `
            <div class="produto" id="card-${p.id}">
                ${foto}
                <div class="produto-info">
                    <div class="produto-nome">${p.nome}</div>
                    <div class="produto-desc">${p.descricao || '—'}</div>
                    <div class="preco-row">
                        <span class="preco-label">R$</span>
                        <input class="preco-input" id="preco-${p.id}"
                               value="${p.preco}" placeholder="299,90"
                               title="Preço atual">
                        <input class="original-input" id="original-${p.id}"
                               value="${p.preco_original || ''}" placeholder="De: (opcional)"
                               title="Preço riscado (De:)">
                        <input class="desconto-input" id="desconto-${p.id}"
                               value="${p.desconto || ''}" placeholder="20% OFF"
                               title="Badge de desconto">
                        ${badgeDesc}
                        <button class="btn-salvar" id="btn-${p.id}"
                                onclick="salvar(${p.id})">
                            Salvar
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // ── FILTRAR ──────────────────────────────────────────────────
    function filtrar(q) {
        const lista = q.trim()
            ? todosOsProdutos.filter(p => p.nome.toLowerCase().includes(q.toLowerCase()))
            : todosOsProdutos;
        renderizar(lista);
    }

    // ── SALVAR PRODUTO ───────────────────────────────────────────
    function salvar(id) {
        const preco    = document.getElementById(`preco-${id}`).value.trim();
        const original = document.getElementById(`original-${id}`).value.trim();
        const desconto = document.getElementById(`desconto-${id}`).value.trim();

        if (!preco) { toast('Preencha o preço!', true); return; }

        const btn = document.getElementById(`btn-${id}`);
        btn.disabled  = true;
        btn.textContent = '...';
        btn.classList.add('salvando');

        fetch(`${API}/api/admin/produtos/${id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'x-admin-senha': SENHA
            },
            body: JSON.stringify({
                preco,
                preco_original: original || null,
                desconto: desconto || null
            })
        })
        .then(r => {
            if (!r.ok) throw new Error(`Erro ${r.status}`);
            return r.json();
        })
        .then(() => {
            toast(`✓ "${todosOsProdutos.find(p=>p.id===id)?.nome || 'Produto'}" atualizado!`);
            // Atualiza o cache local
            const idx = todosOsProdutos.findIndex(p => p.id === id);
            if (idx !== -1) {
                todosOsProdutos[idx].preco          = preco;
                todosOsProdutos[idx].preco_original = original || null;
                todosOsProdutos[idx].desconto       = desconto || null;
            }
        })
        .catch(err => {
            toast(`Erro ao salvar: ${err.message}`, true);
        })
        .finally(() => {
            btn.disabled    = false;
            btn.textContent = 'Salvar';
            btn.classList.remove('salvando');
        });
    }

    // ── TOAST ────────────────────────────────────────────────────
    let _tt;
    function toast(msg, erro = false) {
        clearTimeout(_tt);
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className   = 'show' + (erro ? ' erro' : '');
        _tt = setTimeout(() => { t.className = ''; }, 3500);
    }
</script>
</body>
</html>
